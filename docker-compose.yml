version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: src/AkeoIN.SuperQA.Web.Host/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=superqa;User=root;Password=akeo@mysql;Port=3306;
    depends_on:
      - mysql
    networks:
      - superqa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - BUILD_ENV=${API_ENVIRONMENT:-development}
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - superqa-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=akeo@mysql
      - MYSQL_DATABASE=superqa
      - MYSQL_USER=root
      - MYSQL_PASSWORD=akeo@mysql
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - superqa-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  superqa-network:
    driver: bridge

volumes:
  mysql-data: 