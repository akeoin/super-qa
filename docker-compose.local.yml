version: '3.8'

services:
  api:
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=superqa;User=root;Password=akeo@mysql;Port=3306;
    volumes:
      - ./backend/src:/src
      - ~/.nuget/packages:/root/.nuget/packages:ro

  frontend:
    build:
      args:
        - BUILD_ENV=development
    ports:
      - "4200:80"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    environment:
      - NODE_ENV=development

  mysql:
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=akeo@mysql
      - MYSQL_DATABASE=superqa
      - MYSQL_USER=root
      - MYSQL_PASSWORD=akeo@mysql 